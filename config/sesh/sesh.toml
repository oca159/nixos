[default_session]
startup_command = "nvim -c \"lua require('snacks'); Snacks.picker.files()\""


[[session]]
name = "Downloads 📥"
path = "~/Downloads"
startup_command = "ls"


[[session]]
name = "tmux config"
path = "~/.config/tmux"
startup_command = "nvim tmux.conf"
preview_command = "bat --color=always ~/.config/tmux/tmux.conf"

[[session]]
name = "ghostty config"
path = "~/.config/ghostty"
startup_command = "nvim config"
preview_command = "bat --color=always ~/.config/ghostty/config"

[[session]]
name = "sesh config"
path = "~/.config/sesh"
startup_command = "nvim sesh.toml"
preview_command = "bat --color=always ~/.config/sesh/sesh.toml"

[[session]]
name = "aws credentials config"
path = "~/.aws"
startup_command = "nvim credentials"
preview_command = "bat --color=always ~/.aws/credentials"
